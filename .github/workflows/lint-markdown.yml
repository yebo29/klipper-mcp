name: Lint Markdown

on:
  pull_request:
    paths:
      - '**.md'
      - .markdownlint.jsonc
      - .github/workflows/lint-markdown.yml

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: '**/*.md'

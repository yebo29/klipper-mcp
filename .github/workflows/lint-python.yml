name: Lint Python

on:
  pull_request:
    paths:
      - '**.py'
      - pyproject.toml
      - .github/workflows/lint-python.yml

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
